name: node-ci:typescript

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/typescript/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - uses: ./.github/workflows/node-ci.yml
        with:
          root: ./packages/typescript
