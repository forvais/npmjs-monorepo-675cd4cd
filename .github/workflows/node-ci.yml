name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      javascript: ${{ steps.filter.outputs.javascript }}
      typescript: ${{ steps.filter.outputs.typescript }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            javascript: [ 'packages/javascript/**' ]
            typescript: [ 'packages/typescript/**' ]
      - name: Debugging outputs
        shell: bash
        run: echo "${{ toJSON(steps.filter.outputs) }}"

  lint:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - root: packages/javascript
            changed: ${{ needs.changes.outputs.javascript }}
          - root: packages/typescript
            changed: ${{ needs.changes.outputs.typescript }}
    name: ${{ matrix.root }}
    steps:
      - shell: bash
        run: echo "${{ toJSON(matrix) }}"
      - uses: actions/checkout@v4
        if: matrix.changed
      - uses: pnpm/action-setup@v4
        if: matrix.changed
      - uses: actions/setup-node@v3
        with:
          node-version: 24.x
          cache: "pnpm"
        if: matrix.changed
      - run: pnpm install
        if: matrix.changed
      - run: npx --no-install turbo --filter=${{ matrix.root }} lint
        if: matrix.changed
