name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      javascript: ${{ steps.filter.outputs.javascript }}
      typescript: ${{ steps.filter.outputs.typescript }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            javascript: [ 'packages/javascript' ]
            typescript: [ 'packages/typescript' ]

  lint:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - root: packages/javascript
            changed: ${{ needs.changes.outputs.javascript }}
          - root: packages/typescript
            changed: ${{ needs.changes.outputs.typescript }}
    # skip the whole matrix leg when the flag is false
    if: matrix.changed == 'true'
    name: ${{ matrix.root }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          node-version: 24.x
          cache: "pnpm"
      - run: pnpm install
      - run: npx --no-install turbo --filter=${{ matrix.root }} lint
